<!DOCTYPE html>
<html lang="en">

<body>
    <!-- Sticky Header -->
    <header class="sticky-header">
        <img id="logo" src="logo.jpg" alt="company logo" />
        <h1>Divine Heaven Clinic</h1>
        <p>Today is: <span id="date"></span></p>
    </header>
    <hr>
    
    <!-- Form -->
    <main>
        <div class="form-container" style="text-align: center;">
            <table class="output" style="margin: 0 auto;">

            <p>
                <a href="mailto:migyzuniga@gmail.com">migyzuniga@gmail.com</a> | 
                <a href="mailto:migyzuniga@gmail.com" class="contact">Contact Us!</a> | 
                9999 Elgin Rd, Houston, TX 77004
            </p>
        </div>

    <!-- Display dynamic date -->
    <script>
        const dateElement = document.getElementById('date');
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        const today = new Date().toLocaleDateString('en-US', options);
        dateElement.textContent = today;
    </script>
</body>
